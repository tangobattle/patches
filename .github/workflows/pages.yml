name: deploy to pages

on:
    push:
        branches: ["main"]

    workflow_dispatch:

permissions:
    contents: read
    pages: write
    id-token: write

concurrency:
    group: "pages"
    cancel-in-progress: true

jobs:
    deploy:
        environment:
            name: github-pages
            url: ${{ steps.deployment.outputs.page_url }}
        runs-on: ubuntu-latest
        steps:
            - uses: actions/checkout@v4

            # Cache the crate sources so we don't re-download the
            # bundler's dependencies on every run. tango-patch itself is
            # small and pure Rust, so rebuilding it is cheap; keying on
            # this workflow file is enough to bust the cache deliberately.
            - uses: actions/cache@v4
              with:
                  path: |
                      ~/.cargo/registry
                      ~/.cargo/git
                  key: tango-patch-${{ hashFiles('.github/workflows/pages.yml') }}

            # The bundler lives in its own repo (tangobattle/tango-patch),
            # so we install it straight from git — no checkout of the
            # tango tree, no submodules. `--locked` uses that repo's
            # committed Cargo.lock for a reproducible build.
            - run: cargo install --git https://github.com/tangobattle/tango-patch --features cli --locked

            # Every package must be well-formed before anything ships:
            # a package that fails to open here would fail to open in
            # the app, and the index would happily list it.
            - run: tango-patch validate $(find . -name '*.tangopatch' | sort)

            # Builds index.json — the only file clients poll — and
            # extracts each package's README beside it so the app can
            # show one before downloading the package itself.
            - run: tango-patch index . --readmes

            - uses: actions/upload-pages-artifact@v3
              with:
                  path: "."

            - uses: actions/deploy-pages@v4
              id: deployment
